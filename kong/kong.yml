_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:3001
        - http://localhost:5173
        - http://localhost:5174
        - http://localhost:5175
        - http://127.0.0.1:3000
        - http://127.0.0.1:3001
        - http://127.0.0.1:5173
        - http://127.0.0.1:5174
        - http://127.0.0.1:5175
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
        - x-organiser-api-key
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

services:
  - name: reservation-orchestrator
    url: http://reservation-orchestrator:5000
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: reserve
        paths:
          - /reserve
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: reserve-confirm
        paths:
          - /reserve/confirm
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: waitlist-confirm
        paths:
          - /waitlist/confirm
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: waitlist-leave
        paths:
          - /waitlist/leave
        methods:
          - DELETE
          - OPTIONS
        strip_path: false
    plugins:
      - name: key-auth
        config:
          key_names:
            - x-customer-api-key
          hide_credentials: true
          run_on_preflight: false
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: event-service
    url: http://event-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: get-events
        paths:
          - /events
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-by-id
        paths:
          - ~/event/[^/]+$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-categories
        paths:
          - ~/event/[^/]+/categories$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: update-event-status
        paths:
          - ~/event/[^/]+/status$
        methods:
          - PUT
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: update-event-category-prices
        paths:
          - ~/event/[^/]+/categories/prices$
        methods:
          - PUT
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: get-event-flash-sale-status
        paths:
          - ~/event/[^/]+/flash-sale/status$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-price-history
        paths:
          - ~/event/[^/]+/price-history$
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: waitlist-service-public
    url: http://waitlist-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: waitlist-public
        paths:
          - /waitlist
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: inventory-service-public
    url: http://inventory-service:5000
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: inventory-api
        paths:
          - /inventory
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 180
          policy: local
          fault_tolerant: true

  - name: booking-status-service
    url: http://booking-status-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: booking-status
        paths:
          - ~/booking-status/[^/]+$
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 240
          policy: local
          fault_tolerant: true

  - name: cancellation-orchestrator
    url: http://cancellation-orchestrator:5000
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 10000
    routes:
      - name: cancel-booking
        paths:
          - ~/bookings/cancel/[^/]+$
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: cancellation-reallocation-confirm
        paths:
          - /orchestrator/cancellation/reallocation/confirm
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: cancellation-orchestrator-direct
        paths:
          - /orchestrator/cancellation
        methods:
          - POST
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: payment-webhook
    url: http://payment-service:5000
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: stripe-webhook
        paths:
          - /payment/webhook
        methods:
          - POST
        strip_path: false

  - name: pricing-service
    url: http://pricing-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: get-pricing-snapshot
        paths:
          - ~/pricing/[^/]+$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-pricing-history
        paths:
          - ~/pricing/[^/]+/history$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-pricing-active-flash-sale
        paths:
          - ~/pricing/[^/]+/flash-sale/active$
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: flash-sale-orchestrator
    url: http://flash-sale-orchestrator:5000
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: flash-sale-launch
        paths:
          - /flash-sale/launch
        methods:
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: flash-sale-end
        paths:
          - /flash-sale/end
        methods:
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: flash-sale-status
        paths:
          - ~/flash-sale/[^/]+/status$
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true

  - name: eticket-service
    # Update this URL to your team's OutSystems environment base path when needed.
    url: https://personal-kgqqcaoh.outsystemscloud.com/ETicket_API/rest/v1
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: eticket-generate
        paths:
          - /eticket/generate
        methods:
          - POST
          - OPTIONS
        strip_path: false

consumers:
  - username: customer-frontend
    custom_id: customer-frontend
    keyauth_credentials:
      - key: ticketblitz-customer-dev-key

  - username: organiser-dashboard
    custom_id: organiser-dashboard
    keyauth_credentials:
      - key: ticketblitz-organiser-dev-key
    acls:
      - group: organisers
