_format_version: "3.0"
_transform: true

services:
  - name: event-service
    url: http://event-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: get-events
        paths:
          - /events
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-by-id
        paths:
          - ~/event/[^/]+$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-categories
        paths:
          - ~/event/[^/]+/categories$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: update-event-status
        paths:
          - ~/event/[^/]+/status$
        methods:
          - PUT
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: update-event-category-prices
        paths:
          - ~/event/[^/]+/categories/prices$
        methods:
          - PUT
          - OPTIONS
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - x-organiser-api-key
              hide_credentials: true
              run_on_preflight: false
          - name: acl
            config:
              allow:
                - organisers
              hide_groups_header: true
      - name: get-event-flash-sale-status
        paths:
          - ~/event/[^/]+/flash-sale/status$
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: get-event-price-history
        paths:
          - ~/event/[^/]+/price-history$
        methods:
          - GET
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: waitlist-service-public
    url: http://waitlist-service:5000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 5000
    routes:
      - name: waitlist-public
        paths:
          - /waitlist
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true

  - name: payment-webhook
    url: http://payment-service:5000
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: stripe-webhook
        paths:
          - /payment/webhook
        methods:
          - POST
        strip_path: false

consumers:
  - username: organiser-dashboard
    custom_id: organiser-dashboard
    keyauth_credentials:
      - key: ticketblitz-organiser-dev-key
    acls:
      - group: organisers
